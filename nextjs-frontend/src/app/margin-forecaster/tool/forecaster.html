/* ============================================================
   ASCENDRA BIO — Margin & Markup Forecaster
   Self-contained tool. All state persists locally in-browser.
   ============================================================ */
:root{
  --navy:#17447E; --navy-900:#0F2E58; --navy-950:#0A2140; --navy-700:#1A4C8B;
  --blue-500:#3A6296; --blue-400:#4E77AB; --blue-300:#6E9FCF; --sky:#8FBBE6; --sky-100:#E7F0FA;
  --ink:#0E1726; --ink-600:#3E4A5C; --ink-400:#6B7688; --ink-300:#93A0B2;
  --line:#E4E9F0; --line-2:#EEF2F7; --bg:#F4F7FB; --surface:#FFFFFF; --surface-2:#FAFCFE;
  --good:#1B8F5F; --good-bg:#E7F6EF; --good-line:#BEE7D3;
  --warn:#B77410; --warn-bg:#FBF1DE; --warn-line:#EFD9AE;
  --bad:#C4384A; --bad-bg:#FBE9EC; --bad-line:#F1C7CE;
  --radius:14px; --radius-sm:9px; --radius-pill:999px;
  --shadow-sm:0 1px 2px rgba(16,32,64,.05), 0 1px 3px rgba(16,32,64,.04);
  --shadow:0 4px 14px rgba(16,32,64,.07), 0 1px 3px rgba(16,32,64,.05);
  --shadow-lg:0 18px 44px rgba(10,33,64,.16);
  --sans:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--bg);
  font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1, "cv05" 1;
}
.num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1}
button{font-family:inherit; cursor:pointer}
input{font-family:inherit}
a{color:var(--navy)}
.eyebrow{font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-400)}
.hidden{display:none !important}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:40; background:rgba(255,255,255,.88);
  backdrop-filter:saturate(180%) blur(12px); border-bottom:1px solid var(--line);
}
.topbar-inner{max-width:1320px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; gap:20px}
.brand{display:flex; align-items:center; gap:14px; min-width:0}
.brand img{height:34px; width:auto; display:block}
.brand-div{width:1px; height:26px; background:var(--line); flex:none}
.brand-meta{display:flex; flex-direction:column; gap:1px; min-width:0}
.brand-title{font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; letter-spacing:.01em}
.brand-sub{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-300); font-weight:600}
.topbar-spacer{flex:1}
.viewnav{display:flex; gap:2px; background:var(--line-2); padding:3px; border-radius:var(--radius-pill); border:1px solid var(--line)}
.viewnav button{
  border:0; background:transparent; color:var(--ink-600); font-weight:600; font-size:12.5px;
  padding:7px 15px; border-radius:var(--radius-pill); letter-spacing:.01em; transition:all .15s;
}
.viewnav button:hover{color:var(--ink)}
.viewnav button.active{background:var(--surface); color:var(--navy); box-shadow:var(--shadow-sm)}
.lockbtn{
  display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line);
  background:var(--surface); color:var(--ink-600); font-weight:600; font-size:12px;
  padding:8px 13px; border-radius:var(--radius-pill); transition:all .15s;
}
.lockbtn:hover{border-color:var(--ink-300); color:var(--ink)}
.lockbtn svg{width:14px; height:14px}
.lockbtn.unlocked{background:var(--warn-bg); border-color:var(--warn-line); color:var(--warn)}

/* ascending accent rule under header */
.ascent-rule{height:3px; background:linear-gradient(90deg, var(--navy-900) 0%, var(--navy) 40%, var(--blue-300) 78%, var(--sky) 100%);}

/* ---------- Layout ---------- */
main{max-width:1320px; margin:0 auto; padding:24px 22px 80px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
.builder-grid{display:grid; grid-template-columns:minmax(0,1fr) 380px; gap:22px; align-items:start}
.builder-side{position:sticky; top:86px}

/* ---------- Panels ---------- */
.panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm)}
.panel-head{padding:16px 18px; border-bottom:1px solid var(--line-2); display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.panel-head h2{margin:0; font-size:14.5px; font-weight:600; letter-spacing:.01em}
.panel-head .count{font-size:11.5px; color:var(--ink-400); font-weight:600; background:var(--line-2); padding:2px 9px; border-radius:var(--radius-pill)}
.panel-head-spacer{flex:1}

/* ---------- Add / search combobox ---------- */
.addbar{padding:16px 18px; border-bottom:1px solid var(--line-2); position:relative}
.addbar-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.search-wrap{position:relative; flex:1; min-width:220px}
.search-wrap svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--ink-300); pointer-events:none}
.search-input{
  width:100%; padding:10px 12px 10px 34px; border:1px solid var(--line); border-radius:var(--radius-sm);
  font-size:13.5px; color:var(--ink); background:var(--surface-2); transition:border .15s, box-shadow .15s;
}
.search-input:focus{outline:none; border-color:var(--blue-300); box-shadow:0 0 0 3px var(--sky-100); background:#fff}
.search-input::placeholder{color:var(--ink-300)}
.combo{
  position:absolute; left:18px; right:18px; top:calc(100% - 4px); z-index:30; background:#fff;
  border:1px solid var(--line); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg);
  max-height:340px; overflow:auto; padding:6px;
}
.combo-group{font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-300); padding:9px 10px 5px}
.combo-item{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer}
.combo-item:hover,.combo-item.hi{background:var(--sky-100)}
.combo-item .ci-main{flex:1; min-width:0}
.combo-item .ci-name{font-size:13px; font-weight:500; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.combo-item .ci-sub{font-size:11px; color:var(--ink-400)}
.combo-item .ci-price{font-size:11.5px; color:var(--ink-600); font-weight:600; text-align:right; white-space:nowrap}
.combo-item .ci-price small{display:block; font-weight:500; color:var(--ink-300); font-size:10px}
.combo-empty{padding:16px 10px; color:var(--ink-400); font-size:12.5px; text-align:center}
.combo-add{display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px; background:var(--navy); color:#fff; font-size:15px; line-height:1; flex:none}

/* segmented controls */
.seg{display:inline-flex; background:var(--line-2); border:1px solid var(--line); border-radius:var(--radius-pill); padding:3px; gap:2px}
.seg button{border:0; background:transparent; color:var(--ink-600); font-weight:600; font-size:12px; padding:6px 13px; border-radius:var(--radius-pill); white-space:nowrap; transition:all .13s}
.seg button:hover{color:var(--ink)}
.seg button.active{background:#fff; color:var(--navy); box-shadow:var(--shadow-sm)}
.seg.small button{padding:5px 10px; font-size:11.5px}
.seg-label{font-size:11px; color:var(--ink-400); font-weight:600; margin-right:2px; white-space:nowrap}

.btn{display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); background:var(--surface); color:var(--ink-600); font-weight:600; font-size:12.5px; padding:9px 14px; border-radius:var(--radius-sm); transition:all .15s}
.btn:hover{border-color:var(--ink-300); color:var(--ink)}
.btn svg{width:14px; height:14px}
.btn-primary{background:var(--navy); border-color:var(--navy); color:#fff}
.btn-primary:hover{background:var(--navy-700); border-color:var(--navy-700); color:#fff}
.btn-ghost{border-color:transparent; background:transparent}
.btn-ghost:hover{background:var(--line-2); border-color:transparent}
.btn-sm{padding:7px 11px; font-size:12px}
.btn-danger{color:var(--bad); border-color:var(--bad-line)}
.btn-danger:hover{background:var(--bad-bg); border-color:var(--bad-line); color:var(--bad)}

/* ---------- Order lines ---------- */
.order-list{padding:8px 10px 12px}
.oline{border:1px solid var(--line); border-radius:var(--radius-sm); margin:8px 8px; background:var(--surface); transition:border .15s, box-shadow .15s}
.oline:hover{border-color:var(--line); box-shadow:var(--shadow-sm)}
.oline.under-floor{border-color:var(--bad-line); background:linear-gradient(0deg,var(--bad-bg),var(--bad-bg)) padding-box; box-shadow:inset 3px 0 0 var(--bad)}
.oline.zero{opacity:.62}
.oline-head{display:flex; align-items:flex-start; gap:14px; padding:13px 15px 10px}
.oline-id{flex:1; min-width:0}
.oline-name{font-size:14px; font-weight:600; color:var(--ink); letter-spacing:.005em; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.sku-code{font-size:10.5px; font-weight:600; color:var(--ink-300); letter-spacing:.04em}
.oline-tags{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:5px}
.chip{font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:2px 8px; border-radius:var(--radius-pill); white-space:nowrap}
.chip.cat-glp1{background:#EAF0FB; color:var(--navy)}
.chip.cat-peptides{background:#EEF2F7; color:var(--ink-600)}
.chip.est{background:var(--warn-bg); color:var(--warn); border:1px solid var(--warn-line)}
.chip.floorwarn{background:var(--bad-bg); color:var(--bad); border:1px solid var(--bad-line)}
.oline-meta{font-size:11.5px; color:var(--ink-400); font-weight:500}
.oline-meta b{color:var(--ink-600); font-weight:600}
.oline-metrics{display:flex; gap:18px; flex:none; padding-top:1px}
.metric{text-align:right; min-width:64px}
.metric-label{display:block; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-300); font-weight:700}
.metric-val{display:block; font-size:16px; font-weight:700; letter-spacing:-.01em; margin-top:1px}
.oline-controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:0 15px 13px; border-top:1px dashed var(--line-2); padding-top:12px; margin-top:2px}
.fld{display:flex; flex-direction:column; gap:3px}
.fld > span{font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-300); font-weight:700; padding-left:2px}
.in{width:96px; padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-size:13px; color:var(--ink); background:#fff; transition:border .15s, box-shadow .15s; font-variant-numeric:tabular-nums}
.in:focus{outline:none; border-color:var(--blue-300); box-shadow:0 0 0 3px var(--sky-100)}
.in.qty{width:66px}
.in.price{width:104px; font-weight:600}
.in:disabled{background:var(--line-2); color:var(--ink-400); border-color:var(--line-2); font-weight:500}
.in-money{position:relative}
.in-money::before{content:"$"; position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--ink-300); font-size:12px; pointer-events:none}
.in-money .in{padding-left:19px}
.in-money .in:disabled ~ .dollarhint{color:var(--ink-300)}
.oline-spacer{flex:1; min-width:8px}
.oline-line{text-align:right}
.oline-line span{display:block; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-300); font-weight:700}
.oline-line strong{font-size:15px; font-weight:700; color:var(--ink)}
.line-cost{display:block; font-size:10.5px; color:var(--ink-300); font-weight:600; font-style:normal; margin-top:2px}
.costval{display:flex; align-items:center; height:33px; padding:7px 11px; border:1px solid var(--line-2); border-radius:8px; background:var(--surface-2); color:var(--ink-600); font-size:13px; font-weight:600; min-width:96px}
.icon-btn{width:30px; height:30px; border:1px solid var(--line); background:#fff; border-radius:8px; color:var(--ink-300); display:inline-flex; align-items:center; justify-content:center; transition:all .15s; align-self:flex-end}
.icon-btn:hover{border-color:var(--bad-line); color:var(--bad); background:var(--bad-bg)}
.icon-btn svg{width:14px; height:14px}

.is-good{color:var(--good)} .is-warn{color:var(--warn)} .is-bad{color:var(--bad)}

/* empty state */
.empty{padding:54px 24px; text-align:center}
.empty-mark{width:58px; height:58px; margin:0 auto 16px; }
.empty-mark svg{width:100%; height:100%}
.empty-mark img{width:100%; height:100%; object-fit:contain; opacity:.16}
.empty h3{margin:0 0 6px; font-size:16px; font-weight:600; color:var(--ink)}
.empty p{margin:0 auto; max-width:340px; font-size:13px; color:var(--ink-400)}

/* ---------- Summary panel ---------- */
.summary{overflow:hidden}
.sum-hero{background:radial-gradient(120% 140% at 100% 0%, var(--navy-700) 0%, var(--navy-900) 55%, var(--navy-950) 100%); color:#fff; padding:20px 20px 18px; position:relative; overflow:hidden}
.sum-hero::after{content:""; position:absolute; right:-40px; top:-30px; width:200px; height:200px; background:linear-gradient(135deg, rgba(143,187,230,.22), rgba(143,187,230,0) 60%); transform:rotate(18deg); pointer-events:none}
.sum-hero-top{display:flex; align-items:center; gap:9px; position:relative; z-index:1}
.sum-hero-logo{height:23px; width:23px; object-fit:contain; display:block; flex:none}
.sub-markup{font-size:12px; font-weight:600; color:rgba(255,255,255,.62); letter-spacing:.02em; margin-top:7px}
.sub-markup .num{font-size:15px; font-weight:800; color:var(--sky); letter-spacing:-.01em; margin-right:2px}
.sum-hero-top .eyebrow{color:rgba(255,255,255,.62)}
.sum-figs{display:flex; align-items:flex-end; gap:22px; margin-top:14px; position:relative; z-index:1}
.sum-fig-main{}
.sum-fig-main .lbl{font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:rgba(255,255,255,.6); font-weight:700}
.sum-fig-main .val{font-size:42px; font-weight:800; line-height:1; letter-spacing:-.02em; margin-top:3px}
.sum-fig-side{display:flex; flex-direction:column; gap:9px; padding-bottom:3px}
.sum-fig-side .row{display:flex; justify-content:space-between; gap:16px; font-size:12px}
.sum-fig-side .row .k{color:rgba(255,255,255,.6); font-weight:500}
.sum-fig-side .row .v{font-weight:700}
.margin-tag{display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:var(--radius-pill); margin-top:9px; position:relative; z-index:1}
.margin-tag.good{background:rgba(46,204,133,.18); color:#7EE7B5}
.margin-tag.warn{background:rgba(240,190,90,.18); color:#F4D08A}
.margin-tag.bad{background:rgba(240,120,130,.2); color:#F6B0B8}
.margin-tag .dot{width:6px; height:6px; border-radius:50%; background:currentColor}

/* composition bar */
.sum-block{padding:16px 20px; border-bottom:1px solid var(--line-2)}
.sum-block-title{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px}
.sum-block-title .eyebrow{color:var(--ink-400)}
.sum-block-title .rev{font-size:12px; font-weight:700; color:var(--ink)}
.compbar{height:26px; border-radius:7px; overflow:hidden; display:flex; background:var(--line-2); border:1px solid var(--line)}
.compbar .seg-cost{background:linear-gradient(180deg,#5A6B84,#41506A)}
.compbar .seg-profit{background:linear-gradient(180deg,var(--blue-300),var(--navy))}
.comp-legend{display:flex; gap:16px; margin-top:9px; font-size:11.5px}
.comp-legend .li{display:flex; align-items:center; gap:6px; color:var(--ink-600)}
.comp-legend .sw{width:9px; height:9px; border-radius:3px}
.comp-legend .sw.cost{background:#4C5B74} .comp-legend .sw.profit{background:var(--navy)}
.comp-legend b{color:var(--ink); font-weight:700}

/* tier ladder (signature) */
.ladder-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px}
.ladder-head .hint{font-size:10.5px; color:var(--ink-300); font-weight:500}
.ladder{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; align-items:end; margin-top:14px; height:130px}
.rung{position:relative; display:flex; flex-direction:column; justify-content:flex-end; height:100%; cursor:pointer; border-radius:8px; padding:0 2px; transition:background .15s}
.rung:hover{background:var(--surface-2)}
.rung-bar{border-radius:7px 7px 3px 3px; background:linear-gradient(180deg,var(--blue-300),var(--navy)); position:relative; transition:height .4s cubic-bezier(.2,.7,.2,1); min-height:10px; box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
.rung.active .rung-bar{background:linear-gradient(180deg,var(--sky),var(--blue-400)); box-shadow:0 0 0 2px var(--navy), inset 0 1px 0 rgba(255,255,255,.25)}
.rung-val{font-size:12.5px; font-weight:800; color:var(--ink); text-align:center; margin-bottom:6px; letter-spacing:-.01em}
.rung-foot{text-align:center; margin-top:7px}
.rung-name{font-size:10.5px; font-weight:700; color:var(--ink-600); letter-spacing:.02em}
.rung-sub{font-size:9.5px; color:var(--ink-300); font-weight:600; margin-top:1px}
.rung.active .rung-name{color:var(--navy)}
.rung-actual{grid-column:1 / -1; display:flex; align-items:center; gap:8px; margin-top:14px; padding-top:12px; border-top:1px dashed var(--line); font-size:11.5px; color:var(--ink-600)}
.rung-actual .swatch{width:9px;height:9px;border-radius:3px;background:linear-gradient(180deg,var(--sky),var(--blue-400))}
.rung-actual b{color:var(--ink)}

.sum-actions{padding:14px 20px; display:flex; gap:8px; flex-wrap:wrap}
.sum-actions .btn{flex:1; justify-content:center; min-width:0}

/* ---------- Matrix ---------- */
.matrix-tools{display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px}
.filter-select{padding:8px 11px; border:1px solid var(--line); border-radius:var(--radius-sm); font-size:12.5px; color:var(--ink); background:var(--surface); font-family:inherit; cursor:pointer; max-width:220px}
.filter-select:focus{outline:none; border-color:var(--blue-300); box-shadow:0 0 0 3px var(--sky-100)}
.data-toolbar{display:flex; align-items:center; gap:12px; padding:14px 18px 4px; flex-wrap:wrap}
.filter-hint{font-size:11px; color:var(--ink-300); font-weight:500}
th.sortable{cursor:pointer; user-select:none; white-space:nowrap}
th.sortable:hover{color:var(--navy)}
.sort-ind{font-size:8px; margin-left:3px; color:var(--navy)}
.sort-ind.dim{color:var(--ink-300); opacity:.55}
th.sortable:hover .sort-ind.dim{opacity:.9}
.cat-chip{display:inline-block; font-size:9px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-400); background:var(--line-2); padding:1px 7px; border-radius:var(--radius-pill); margin-left:8px; vertical-align:middle}
.din.cat-in{width:140px; text-align:left; font-weight:500}
.filter-empty{padding:26px; text-align:center; color:var(--ink-300); font-size:13px}
.tablewrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); background:#fff; box-shadow:var(--shadow-sm)}
table.matrix{border-collapse:collapse; width:100%; min-width:820px; font-size:12.5px}
table.matrix thead th{position:sticky; top:0; background:var(--surface-2); z-index:2}
table.matrix th, table.matrix td{padding:9px 12px; text-align:right; border-bottom:1px solid var(--line-2); white-space:nowrap}
table.matrix th:first-child, table.matrix td:first-child{text-align:left; position:sticky; left:0; background:#fff; z-index:1}
table.matrix thead th:first-child{z-index:3}
table.matrix .grp-th{background:var(--navy-900); color:#fff; text-transform:uppercase; letter-spacing:.1em; font-size:10px; font-weight:700; text-align:center; padding:7px 12px}
table.matrix .sub-th{font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-400); font-weight:700; background:var(--surface-2)}
table.matrix tbody tr:hover td{background:var(--sky-100)}
table.matrix tbody tr:hover td:first-child{background:var(--sky-100)}
.m-name{font-weight:600; color:var(--ink)}
.m-name .sku-code{margin-left:7px}
.m-cost{color:var(--ink-600); font-weight:600}
.tier-divide{border-left:1px solid var(--line)}
.mini-flag{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--warn); margin-left:6px; vertical-align:middle}

/* ---------- Data & Settings ---------- */
.data-cols{display:grid; grid-template-columns:1fr; gap:22px}
.tier-manager{padding:14px 18px; display:flex; flex-direction:column; gap:10px}
.tier-row{display:flex; align-items:flex-end; gap:12px; padding:12px 14px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface-2)}
.tier-ord{display:flex; flex-direction:column; gap:3px; flex:none}
.tier-move{width:26px; height:19px; border:1px solid var(--line); background:#fff; border-radius:6px; color:var(--ink-400); font-size:9px; line-height:1; display:flex; align-items:center; justify-content:center; padding:0}
.tier-move:hover:not(:disabled){border-color:var(--blue-300); color:var(--navy); background:var(--sky-100)}
.tier-move:disabled{opacity:.3; pointer-events:none}
.tier-fields{display:grid; grid-template-columns:1fr 1.4fr; gap:12px; flex:1; min-width:0}
.tier-row .ff{display:flex; flex-direction:column; gap:4px; min-width:0}
.tier-row .ff label{font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-400); font-weight:700}
.tier-row .din{width:100%}
.tier-note{padding:0 18px 16px; font-size:11px; color:var(--ink-400); line-height:1.5}
.tier-note b{color:var(--ink-600)}
.tier-actions{display:flex; align-items:center; gap:6px; flex:none; align-self:flex-end}
.tier-reprice{padding:6px 10px}
.btn:disabled{opacity:.4; pointer-events:none}
.d-actions{white-space:nowrap; text-align:right}
.d-actions .d-remove{margin-left:4px}
.d-dupe:hover:not(:disabled){border-color:var(--blue-300); color:var(--navy); background:var(--sky-100)}
.reprice-row{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
.reprice-row select.din{height:34px}
.reprice-check{display:flex; align-items:center; gap:7px; margin-top:13px; font-size:12.5px; color:var(--ink-600)}
.assump-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; padding:18px}
.assump{border:1px solid var(--line); border-radius:var(--radius-sm); padding:13px 14px; background:var(--surface-2)}
.assump .eyebrow{color:var(--ink-400)}
.assump .a-in{display:flex; align-items:center; gap:6px; margin-top:8px}
.assump .a-in input{width:78px; padding:7px 9px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-weight:600; background:#fff; color:var(--ink)}
.assump .a-in input:focus{outline:none; border-color:var(--blue-300); box-shadow:0 0 0 3px var(--sky-100)}
.assump .a-in .unit{color:var(--ink-400); font-size:13px; font-weight:600}
.assump .a-note{font-size:10.5px; color:var(--ink-300); margin-top:7px; line-height:1.4}
.assump.disabled{opacity:.7}
.assump.disabled input{background:var(--line-2); pointer-events:none}

.lock-banner{display:flex; align-items:center; gap:12px; padding:13px 18px; background:var(--surface-2); border-bottom:1px solid var(--line-2); font-size:12.5px; color:var(--ink-600)}
.lock-banner svg{width:16px; height:16px; color:var(--ink-400); flex:none}
.lock-banner.editing{background:var(--warn-bg); color:var(--warn)}
.lock-banner.editing svg{color:var(--warn)}
.lock-banner .spacer{flex:1}

table.data{border-collapse:collapse; width:100%; min-width:880px; font-size:12.5px}
table.data th{background:var(--surface-2); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-400); font-weight:700; padding:10px 10px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap; position:sticky; top:0; z-index:2}
table.data th:first-child, table.data td:first-child{text-align:left; position:sticky; left:0; background:#fff; z-index:1}
table.data thead th:first-child{z-index:3; background:var(--surface-2)}
table.data td{padding:6px 10px; text-align:right; border-bottom:1px solid var(--line-2); white-space:nowrap}
table.data tbody tr:hover td{background:var(--surface-2)}
table.data .d-name{font-weight:600; color:var(--ink); text-align:left}
.din{width:82px; padding:6px 8px; border:1px solid var(--line); border-radius:7px; font-size:12.5px; text-align:right; background:#fff; color:var(--ink); font-variant-numeric:tabular-nums}
.din:focus{outline:none; border-color:var(--blue-300); box-shadow:0 0 0 3px var(--sky-100)}
.din:disabled{background:transparent; border-color:transparent; color:var(--ink); padding-left:0; padding-right:2px}
.din.name-in{width:150px; text-align:left; font-weight:600}
.din.wide{width:110px}
.d-preview{font-size:10.5px; color:var(--ink-300); font-weight:600}
.d-remove{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink-300);display:inline-flex;align-items:center;justify-content:center}
.d-remove:hover{border-color:var(--bad-line);color:var(--bad);background:var(--bad-bg)}
.d-remove:disabled{opacity:.3; pointer-events:none}

.addsku-form{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; padding:18px; background:var(--surface-2); border-bottom:1px solid var(--line-2)}
.addsku-form .ff{display:flex; flex-direction:column; gap:4px}
.addsku-form label{font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-400); font-weight:700}
.addsku-form input, .addsku-form select{padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; background:#fff; color:var(--ink)}
.addsku-form input:focus, .addsku-form select:focus{outline:none; border-color:var(--blue-300); box-shadow:0 0 0 3px var(--sky-100)}
.addsku-actions{display:flex; align-items:flex-end; gap:8px}

.data-mgmt{display:flex; gap:10px; flex-wrap:wrap; padding:18px}
.provenance{padding:16px 18px; font-size:11px; color:var(--ink-400); line-height:1.6; border-top:1px solid var(--line-2)}
.provenance b{color:var(--ink-600)}

/* ---------- Toast ---------- */
.toast-wrap{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:80; display:flex; flex-direction:column; gap:8px; align-items:center}
.toast{background:var(--ink); color:#fff; padding:11px 18px; border-radius:var(--radius-pill); font-size:12.5px; font-weight:600; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:9px; animation:toastin .25s ease}
.toast svg{width:15px; height:15px; color:var(--sky)}
@keyframes toastin{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}

/* ---------- Modal ---------- */
.modal-scrim{position:fixed; inset:0; background:rgba(10,25,50,.5); backdrop-filter:blur(3px); z-index:90; display:flex; align-items:center; justify-content:center; padding:20px; animation:fade .18s ease}
.modal{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow-lg); max-width:420px; width:100%; overflow:hidden}
.modal-head{padding:20px 22px 6px}
.modal-head h3{margin:0; font-size:16px; font-weight:700}
.modal-body{padding:8px 22px 4px; font-size:13.5px; color:var(--ink-600); line-height:1.55}
.modal-foot{padding:16px 22px 20px; display:flex; gap:10px; justify-content:flex-end}
.modal textarea{width:100%; min-height:120px; border:1px solid var(--line); border-radius:8px; padding:10px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; resize:vertical; color:var(--ink)}

/* ---------- Responsive ---------- */
@media (max-width:1080px){
  .builder-grid{grid-template-columns:1fr}
  .builder-side{position:static}
}
@media (max-width:680px){
  .topbar-inner{flex-wrap:wrap; gap:12px; padding:12px 16px}
  .brand-meta{display:none}
  .topbar-spacer{display:none}
  .viewnav{order:3; width:100%; justify-content:space-between}
  .viewnav button{flex:1}
  main{padding:18px 14px 90px}
  .oline-head{flex-direction:column; gap:10px}
  .oline-metrics{gap:22px}
  .oline-controls{gap:8px}
  .in.price{width:96px} .in{width:88px}
  .sum-fig-main .val{font-size:36px}
  .ladder{height:110px}
}

/* ---------- Print document (dedicated, replaces dashboard when printing) ---------- */
.print-doc{display:none}
.pd-head{display:flex; align-items:center; gap:16px; padding-bottom:12px; border-bottom:2px solid var(--navy); margin-bottom:16px}
.pd-head img{height:34px; width:auto}
.pd-title h1{margin:0; font-size:17px; font-weight:700; letter-spacing:.01em; color:var(--ink)}
.pd-title span{font-size:11px; color:var(--ink-400)}
.pd-summary{display:flex; align-items:stretch; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:18px}
.pd-sum-main{background:var(--navy-900); color:#fff; padding:13px 18px; min-width:200px; display:flex; flex-direction:column; justify-content:center}
.pd-sum-main .pd-lbl{font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.6); font-weight:700}
.pd-sum-main .pd-big{font-size:31px; font-weight:800; line-height:1.05; margin-top:2px}
.pd-sum-main .pd-markup{font-size:11px; color:var(--sky); font-weight:600; margin-top:3px}
.pd-sum-stats{flex:1; display:grid; grid-template-columns:repeat(5,1fr)}
.pd-sum-stats > div{padding:10px 14px; border-left:1px solid var(--line); display:flex; flex-direction:column; justify-content:center; gap:3px}
.pd-sum-stats span{font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-400); font-weight:700}
.pd-sum-stats b{font-size:15px; font-weight:700; color:var(--ink)}
.pd-table{width:100%; border-collapse:collapse; margin-bottom:4px; font-size:10.5px}
.pd-table th{text-align:left; font-size:8.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-400); font-weight:700; padding:8px; border-bottom:1.5px solid var(--navy)}
.pd-table th.r, .pd-table td.r{text-align:right}
.pd-table td{padding:7px 8px; border-bottom:1px solid var(--line-2); vertical-align:top; color:var(--ink)}
.pd-table tbody tr:nth-child(even){background:var(--surface-2)}
.pd-name{font-weight:600}
.pd-name span{color:var(--ink-300); font-weight:500; font-size:9px; margin-left:6px}
.pd-name em{font-style:normal; font-size:8px; font-weight:700; color:var(--warn); background:var(--warn-bg); padding:1px 5px; border-radius:8px; margin-left:5px}
.pd-table .strong{font-weight:700}
.pd-table tfoot td{border-top:1.5px solid var(--navy); border-bottom:none; font-weight:700; padding-top:9px; color:var(--ink)}
.pd-good{color:var(--good)} .pd-warn{color:var(--warn)} .pd-bad{color:var(--bad)}
.pd-empty{text-align:center; color:var(--ink-300); padding:18px}
.pd-section-title{font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-600); font-weight:700; margin:18px 0 8px}
.pd-tier tbody tr.pd-active{background:#EAF0FB}
.pd-badge{font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--navy); background:#fff; border:1px solid #C9DAF0; padding:1px 6px; border-radius:8px; margin-left:6px}
.pd-foot{margin-top:18px; padding-top:10px; border-top:1px solid var(--line); font-size:8.5px; color:var(--ink-300); line-height:1.55}
.pd-matrix{font-size:9px}
.pd-matrix th{padding:5px 7px}
.pd-matrix td{padding:5px 7px; border-bottom:1px solid var(--line-2)}
.pd-matrix .pd-tier-grp{text-align:center; background:var(--navy-900); color:#fff; text-transform:uppercase; letter-spacing:.05em; font-size:8px; border-left:2px solid #fff}
.pd-matrix .pd-tier-div{border-left:1px solid var(--line)}
.pd-matrix .pd-name span{display:inline}

/* ---------- Reduced motion ---------- */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important}
}

/* ---------- Print ---------- */
@media print{
  @page{margin:12mm}
  html,body{background:#fff !important}
  #app,.topbar,.ascent-rule,.toast-wrap,#modalRoot,.no-print{display:none !important}
  .print-doc{display:block !important; -webkit-print-color-adjust:exact; print-color-adjust:exact}
  .print-doc *{-webkit-print-color-adjust:exact; print-color-adjust:exact}
  .pd-head,.pd-summary{break-inside:avoid}
  .pd-table thead{display:table-header-group}
  .pd-table tfoot{display:table-footer-group}
  .pd-table tr{break-inside:avoid}
  .pd-section-title{break-after:avoid}
}
</style>
<style id="printOrient"></style>
</head>
<body>

<div id="printDoc" class="print-doc"></div>

<header class="topbar no-print">
  <div class="topbar-inner">
    <div class="brand">
      <img id="brandLogo" alt="Ascendra Bio">
      <div class="brand-div"></div>
      <div class="brand-meta">
        <span class="brand-title">Margin &amp; Markup Forecaster</span>
        <span class="brand-sub">Sales Pricing Console</span>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <button class="lockbtn" id="lockBtn" data-act="lock" title="Editing of costs & tier pricing is locked">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      <span id="lockLabel">Locked</span>
    </button>
    <nav class="viewnav" id="viewNav">
      <button data-act="view" data-view="builder" class="active">Quote Builder</button>
      <button data-act="view" data-view="matrix">Margin Matrix</button>
      <button data-act="view" data-view="data">Data &amp; Settings</button>
    </nav>
  </div>
</header>
<div class="ascent-rule no-print"></div>

<main id="app">

  <!-- ============ BUILDER ============ -->
  <section class="view" id="view-builder">
    <div class="builder-grid">
      <div class="builder-main">
        <div class="panel">
          <div class="panel-head">
            <h2>Quote</h2>
            <span class="count" id="lineCount">0 SKUs</span>
            <div class="panel-head-spacer"></div>
            <span class="seg-label">Default tier</span>
            <div class="seg small" id="globalTierSeg" role="group" aria-label="Default pricing tier"></div>
          </div>

          <div class="addbar">
            <div class="addbar-row">
              <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                <input class="search-input" id="skuSearch" type="text" placeholder="Search products to add to the quote…" autocomplete="off">
              </div>
              <button class="btn btn-sm" data-act="applyAll" title="Set every line to the default tier">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
                Apply tier to all
              </button>
              <button class="btn btn-sm" data-act="clearOrder" title="Remove all lines">Clear</button>
            </div>
            <div class="combo hidden" id="combo"></div>
          </div>

          <div id="orderList" class="order-list"></div>
        </div>
      </div>

      <aside class="builder-side">
        <div class="panel summary" id="summaryPanel"></div>
      </aside>
    </div>
  </section>

  <!-- ============ MATRIX ============ -->
  <section class="view hidden" id="view-matrix">
    <div class="matrix-tools">
      <div class="search-wrap" style="max-width:280px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input class="search-input" id="matrixSearch" type="text" placeholder="Filter SKUs…" autocomplete="off">
      </div>
      <select id="matrixCatFilter" class="filter-select" title="Filter by category"></select>
      <span class="seg-label">Show</span>
      <div class="seg small" id="matrixColSeg" role="group">
        <button data-col="price" class="active">Price</button>
        <button data-col="markup" class="active">Markup</button>
        <button data-col="margin" class="active">Margin</button>
      </div>
      <div class="panel-head-spacer"></div>
      <button class="btn btn-sm" data-act="print"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>Print</button>
    </div>
    <div class="tablewrap">
      <table class="matrix" id="matrixTable"></table>
    </div>
  </section>

  <!-- ============ DATA & SETTINGS ============ -->
  <section class="view hidden" id="view-data">
    <div class="data-cols">

      <div class="panel">
        <div class="panel-head"><h2>Model assumptions</h2></div>
        <div class="lock-banner" id="assumpLock"></div>
        <div class="assump-grid" id="assumpGrid"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Pricing tiers</h2>
          <span class="count" id="tierCount">0 tiers</span>
          <div class="panel-head-spacer"></div>
          <button class="btn btn-sm" data-act="addTier" id="addTierBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Add tier</button>
        </div>
        <div class="lock-banner" id="tierLock"></div>
        <div class="tier-manager" id="tierManager"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Cost &amp; tier pricing</h2>
          <span class="count" id="skuCount">0 SKUs</span>
          <div class="panel-head-spacer"></div>
          <button class="btn btn-sm" data-act="addSkuToggle" id="addSkuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Add SKU</button>
        </div>
        <div class="lock-banner" id="dataLock"></div>
        <div class="addsku-form hidden" id="addSkuForm"></div>
        <div class="data-toolbar">
          <div class="search-wrap" style="max-width:260px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            <input class="search-input" id="dataSearch" type="text" placeholder="Search SKUs…" autocomplete="off">
          </div>
          <select id="dataCatFilter" class="filter-select" title="Filter by category"></select>
          <div class="panel-head-spacer"></div>
          <span class="filter-hint">Click a column header to sort</span>
        </div>
        <datalist id="cat-datalist"></datalist>
        <div class="tablewrap" style="border:0; border-radius:0; box-shadow:none">
          <table class="data" id="dataTable"></table>
        </div>
        <div class="provenance" id="provenance"></div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>Data management</h2></div>
        <div class="data-mgmt">
          <button class="btn" data-act="exportConfig"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>Export configuration</button>
          <button class="btn" data-act="importConfig"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 12-4-4m4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>Import configuration</button>
          <button class="btn" data-act="exportCsv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4zM4 10h16M10 4v16"/></svg>Export quote (CSV)</button>
          <button class="btn btn-danger" data-act="reset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5"/></svg>Reset to source data</button>
        </div>
      </div>

    </div>
  </section>

</main>

const FACTORY_ASSUMPTIONS = {
  discount: 0.15,   // Tidetron supplier discount → COGS = list × (1 − discount)
  uplift: 0.25,     // Ascendra sell = reference price × (1 + uplift)
  goodMargin: 0.80, // margin ≥ → healthy (green)
  warnMargin: 0.65  // margin ≥ → caution (amber); below → red
};

const FACTORY_TIERS = [
  {key:'regular', name:'Regular', sub:'No minimum'},
  {key:'t2k',     name:'Tier $2K', sub:'MOQ $2,000'},
  {key:'t5k',     name:'Tier $5K', sub:'MOQ $5,000'},
  {key:'best',    name:'Tier $10K', sub:'MOQ $10,000'}
];
// TIERS is a live reference to state.tiers (kept in sync on load / import / reset).
let TIERS = FACTORY_TIERS.map(t=>({...t}));
const firstTierKey = () => (TIERS[0]||{}).key || 'regular';
const lastTierKey  = () => (TIERS[TIERS.length-1]||{}).key || 'regular';
const tierExists   = k => TIERS.some(t=>t.key===k);
const tierName     = k => { const t=TIERS.find(x=>x.key===k); return t?t.name:k; };
const firstTierName = () => (TIERS[0]||{}).name || '';
const lastTierName  = () => (TIERS[TIERS.length-1]||{}).name || '';
function tierPriceRange(sku){
  const vals = TIERS.map(t=>sku.price[t.key]).filter(v=>typeof v==='number' && !isNaN(v));
  if(!vals.length) return '—';
  const lo=Math.min(...vals), hi=Math.max(...vals);
  return lo===hi ? fmtMoney(lo) : fmtMoney(lo)+'–'+fmtMoney(hi);
}
function newTierKey(){ let k; do{ k='t_'+Math.random().toString(36).slice(2,8); }while(tierExists(k)); return k; }
const SCHEMA_VERSION = 2;
const STORAGE_KEY = 'ascendra.marginTool.v1';

/* ============ STORAGE (graceful fallback) ============ */
let _mem = null;
const store = {
  load(){
    try{ const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; }
    catch(e){ return _mem; }
  },
  save(obj){
    _mem = obj;
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); return true; }
    catch(e){ return false; }
  },
  clear(){ _mem=null; try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} }
};

/* ============ STATE ============ */
let state;
function factoryState(){
  return {
    version: SCHEMA_VERSION,
    tiers: FACTORY_TIERS.map(t=>({...t})),
    assumptions: {...FACTORY_ASSUMPTIONS},
    skus: FACTORY_SKUS.map(s=>({...s, price:{...s.price}, locked:true})),
    order: {},            // id -> {qty, mode, custom, floor}
    ui: { globalTier:'regular' }
  };
}
function loadState(){
  const saved = store.load();
  // accept any saved payload with SKUs; migrate missing pieces (e.g. pre-tier-flexibility saves)
  if(saved && Array.isArray(saved.skus)){
    const tiers = (Array.isArray(saved.tiers) && saved.tiers.length)
      ? saved.tiers.map(t=>({...t}))
      : FACTORY_TIERS.map(t=>({...t}));
    const gt = (saved.ui && saved.ui.globalTier && tiers.some(t=>t.key===saved.ui.globalTier))
      ? saved.ui.globalTier : (tiers[0]||{}).key;
    return {
      version: SCHEMA_VERSION,
      tiers,
      assumptions: {...FACTORY_ASSUMPTIONS, ...(saved.assumptions||{})},
      skus: saved.skus.map(s=>({...s, price:{...s.price}})),
      order: saved.order || {},
      ui: { globalTier: gt }
    };
  }
  return factoryState();
}
// keep selections valid after tiers change; returns true if anything was fixed
function sanitizeSelections(){
  let changed=false;
  if(!tierExists(state.ui.globalTier)){ state.ui.globalTier=firstTierKey(); changed=true; }
  for(const id of orderIds()){
    const L=state.order[id];
    if(L.mode!=='custom' && !tierExists(L.mode)){
      L.mode = tierExists(state.ui.globalTier)?state.ui.globalTier:firstTierKey();
      const s=skuById(id); if(s) L.custom=round4(s.price[L.mode]??0);
      changed=true;
    }
  }
  return changed;
}
let saveTimer=null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    store.save({version:SCHEMA_VERSION, savedAt:new Date().toISOString(),
      tiers:state.tiers, assumptions:state.assumptions, skus:state.skus, order:state.order, ui:state.ui});
  }, 250);
}
let LOCKED = true; // always start locked regardless of saved state

/* ============ HELPERS ============ */
const $ = s=>document.querySelector(s);
const skuById = id => state.skus.find(s=>s.id===id);
function fmtMoney(v, dec=2){
  if(v===null||v===undefined||isNaN(v)) return '—';
  return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fmtMoney0(v){ return fmtMoney(v,0); }
function fmtMargin(m){ if(!isFinite(m)) return '—'; return (m*100).toFixed(1)+'%'; }
function fmtMarkup(r){
  if(!isFinite(r)) return '—';
  const p = r*100;
  const dec = Math.abs(p)>=1000 ? 0 : (Math.abs(p)>=100?0:1);
  return p.toLocaleString('en-US',{minimumFractionDigits:dec, maximumFractionDigits:dec})+'%';
}
function calc(cost, price){
  const profit = price - cost;
  return { profit, markup: cost>0? profit/cost : Infinity, margin: price>0? profit/price : (price===0?0:-Infinity) };
}
function healthClass(margin){
  const a = state.assumptions;
  if(margin >= a.goodMargin) return 'good';
  if(margin >= a.warnMargin) return 'warn';
  return 'bad';
}
function suggestFloor(sku){
  const warn = state.assumptions.warnMargin;
  if(warn>=1) return sku.cost;
  return sku.cost/(1-warn);
}
function effectivePrice(line, sku){
  if(line.mode==='custom') return (line.custom===''||line.custom===undefined||line.custom===null)? 0 : Number(line.custom);
  const p = sku.price[line.mode];
  return (p===undefined||p===null||isNaN(p)) ? 0 : p;
}
function ensureLine(id){
  if(!state.order[id]){
    const sku = skuById(id);
    const gt = tierExists(state.ui.globalTier) ? state.ui.globalTier : firstTierKey();
    state.order[id] = { qty:1, mode:gt, custom: round4(sku.price[gt]??0), floor: round2(suggestFloor(sku)) };
  }
  return state.order[id];
}
const round2 = v => Math.round(v*100)/100;
const round4 = v => Math.round(v*10000)/10000;
const orderIds = () => Object.keys(state.order);

/* ============ ORDER TOTALS ============ */
function orderTotals(){
  let rev=0, cost=0, units=0, lines=0;
  for(const id of orderIds()){
    const sku=skuById(id); if(!sku) continue;
    const L=state.order[id]; const q=Number(L.qty)||0;
    if(q<=0) continue;
    const p=effectivePrice(L,sku);
    rev += p*q; cost += sku.cost*q; units += q; lines++;
  }
  const profit=rev-cost;
  return {rev,cost,profit,units,lines, margin: rev>0?profit/rev:0, markup: cost>0?profit/cost:0};
}
function tierTotals(tierKey){
  let rev=0, cost=0;
  for(const id of orderIds()){
    const sku=skuById(id); if(!sku) continue;
    const q=Number(state.order[id].qty)||0; if(q<=0) continue;
    rev += sku.price[tierKey]*q; cost += sku.cost*q;
  }
  const profit=rev-cost;
  return {rev,cost,profit, margin: rev>0?profit/rev:0, markup: cost>0?profit/cost:0};
}

/* ============ SEGMENTED RENDER ============ */
function renderTierSeg(el, activeKey, actName){
  el.innerHTML = TIERS.map(t=>
    `<button data-act="${actName}" data-mode="${t.key}" class="${t.key===activeKey?'active':''}">${t.name}</button>`
  ).join('');
}

/* ============ BUILDER: ORDER LIST ============ */
function catChip(sku){
  const cls = sku.cat==='GLP-1' ? 'cat-glp1':'cat-peptides';
  const label = sku.cat==='GLP-1' ? 'GLP-1' : 'Peptide';
  return `<span class="chip ${cls}">${label}</span>`;
}
function renderOrderList(){
  const host = $('#orderList');
  const ids = orderIds();
  $('#lineCount').textContent = ids.length + (ids.length===1?' SKU':' SKUs');
  if(ids.length===0){
    host.innerHTML = `<div class="empty">
      <div class="empty-mark"><img src="${LOGO_MARK}" alt="Ascendra Bio"></div>
      <h3>Start a quote</h3>
      <p>Search products above to add them here. Pick a pricing tier or set a custom price on any line to forecast margin and markup instantly.</p>
    </div>`;
    return;
  }
  host.innerHTML = ids.map(id=>orderLineHTML(id)).join('');
}
function orderLineHTML(id){
  const sku = skuById(id); const L = state.order[id];
  const price = effectivePrice(L, sku);

  const lineTotal = price*q;
  const floor = (L.floor===''||L.floor==null)? null : Number(L.floor);
  const underFloor = (L.mode==='custom' && floor!=null && price < floor);
  const hc = underFloor ? 'bad' : healthClass(margin);
  const estChip = sku.flag ? `<span class="chip est" title="${sku.flag}">Est.</span>` : '';
  const modeBtns = TIERS.map(t=>`<button data-act="mode" data-id="${id}" data-mode="${t.key}" class="${L.mode===t.key?'active':''}">${t.name}</button>`).join('')
    + `<button data-act="mode" data-id="${id}" data-mode="custom" class="${L.mode==='custom'?'active':''}">Custom</button>`;
  const priceDisabled = L.mode!=='custom';
  const priceVal = priceDisabled ? price.toFixed(2) : (L.custom??'');
  return `<div class="oline ${underFloor?'under-floor':''} ${q<=0?'zero':''}" data-id="${id}" data-role="oline">
    <div class="oline-head">
      <div class="oline-id">
        <div class="oline-name">${sku.name}<span class="sku-code">${sku.code||''}</span></div>
        <div class="oline-tags">
          ${catChip(sku)} ${estChip}
          ${underFloor?'<span class="chip floorwarn">Below floor</span>':''}
        </div>
      </div>
      <div class="oline-metrics">
        <div class="metric"><span class="metric-label">Markup</span><span class="metric-val num is-${hc}" data-role="mk">${fmtMarkup(markup)}</span></div>
        <div class="metric"><span class="metric-label">Margin</span><span class="metric-val num is-${hc}" data-role="mg">${fmtMargin(margin)}</span></div>
      </div>
    </div>
    <div class="oline-controls">
      <div class="seg small" role="group" data-role="modeseg">${modeBtns}</div>
      <div class="fld"><span>Unit cost</span>
        <div class="costval num">${fmtMoney(sku.cost)}</div>
      </div>
      <div class="fld"><span>Unit price</span>
        <div class="in-money"><input class="in price" type="number" step="0.01" min="0" inputmode="decimal" data-act="price" data-id="${id}" data-role="price" value="${priceVal}" ${priceDisabled?'disabled':''}></div>
      </div>
      <div class="fld"><span>Floor</span>
        <div class="in-money"><input class="in price" type="number" step="0.01" min="0" inputmode="decimal" data-act="floor" data-id="${id}" data-role="floor" value="${L.floor??''}" placeholder="${round2(suggestFloor(sku)).toFixed(2)}"></div>
      </div>
      <div class="fld"><span>Qty</span>
        <input class="in qty" type="number" step="1" min="0" inputmode="numeric" data-act="qty" data-id="${id}" data-role="qty" value="${L.qty}">

/* in-place row update (keeps input focus) */
function updateRow(id){
  const sku = skuById(id); const L = state.order[id];
  const row = document.querySelector(`.oline[data-id="${id}"]`);
  if(!row) return;
  const price = effectivePrice(L, sku);
  const {markup, margin} = calc(sku.cost, price);
  const q = Number(L.qty)||0;
  const floor = (L.floor===''||L.floor==null)? null : Number(L.floor);
  const underFloor = (L.mode==='custom' && floor!=null && price < floor);
  const hc = underFloor ? 'bad' : healthClass(margin);
  const mk = row.querySelector('[data-role="mk"]'); const mg = row.querySelector('[data-role="mg"]');
  mk.textContent = fmtMarkup(markup); mg.textContent = fmtMargin(margin);
  mk.className = 'metric-val num is-'+hc; mg.className='metric-val num is-'+hc;
  row.querySelector('[data-role="line"]').textContent = fmtMoney(price*q);
  const lc = row.querySelector('[data-role="linecost"]'); if(lc) lc.textContent = 'cost '+fmtMoney(sku.cost*q);
  row.classList.toggle('under-floor', underFloor);
  row.classList.toggle('zero', q<=0);
  // floor warning chip
  let chip = row.querySelector('.chip.floorwarn');
  if(underFloor && !chip){
    const tags = row.querySelector('.oline-tags');
    chip = document.createElement('span'); chip.className='chip floorwarn'; chip.textContent='Below floor';
    tags.appendChild(chip);
  } else if(!underFloor && chip){ chip.remove(); }
  // mode segmented active
  row.querySelectorAll('[data-role="modeseg"] button').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===L.mode);
  });
  // price input enabled/value
  const pin = row.querySelector('[data-role="price"]');
  if(L.mode==='custom'){
    if(pin.disabled){ pin.disabled=false; pin.value = (L.custom??price.toFixed(2)); }
  } else {
    pin.disabled = true; pin.value = price.toFixed(2);
  }
}

let comboHi = -1;
function renderCombo(q){
  const combo = $('#combo');
  const query = (q||'').trim().toLowerCase();
  const inOrder = new Set(orderIds());
  let matches = state.skus.filter(s=>!inOrder.has(s.id));
  if(query){
    matches = matches.filter(s=>
      s.name.toLowerCase().includes(query) ||
      (s.code||'').toLowerCase().includes(query) ||
      (s.product||'').toLowerCase().includes(query) ||
      s.catFull.toLowerCase().includes(query));
  }
  if(matches.length===0){
    combo.innerHTML = `<div class="combo-empty">${inOrder.size===state.skus.length?'All SKUs are already in the quote.':'No products match “'+ (q||'') +'”.'}</div>`;
    combo.classList.remove('hidden'); comboHi=-1; return;
  }
  matches = matches.slice(0,40);
  // group by category
  const groups = {};
  matches.forEach(s=>{ (groups[s.catFull] = groups[s.catFull]||[]).push(s); });
  let html=''; let idx=0;
  for(const g of Object.keys(groups)){
    html += `<div class="combo-group">${g}</div>`;

}

function addSkuSave(){
  const g=id=>{const el=document.getElementById(id); return el?el.value.trim():'';};

  state.skus.push({ id, cat, catFull, name:(product+' '+strength).trim(), product, strength, code:g('ns-code'), flag:'', cost, price });

function editSkuField(id, field, value){
  const s=skuById(id); if(!s) return;
  if(field==='name'){ s.name=value; s.product=value; }
  else if(field==='category'){ s.catFull=value; s.cat=/glp/i.test(value)?'GLP-1':'Peptides'; }
  else if(field==='cost'){ s.cost=parseFloat(value)||0; }
  else if(field.startsWith('price.')){ const k=field.split('.')[1]; s.price[k]=parseFloat(value)||0; }
  // live preview update in that row
  const row=document.querySelector(`#dataTable tr[data-id="${id}"]`);

}

function addTier(){
  if(LOCKED) return;
  const seedKey = lastTierKey();
  const key = newTierKey();
  state.tiers.push({key, name:'New tier', sub:''});
  for(const s of state.skus){ s.price[key] = (s.price[seedKey]!=null ? s.price[seedKey] : 0); }
  renderData(); persist();
  const inp = document.querySelector(`.tier-row[data-tkey="${key}"] input[data-field="name"]`);
  if(inp){ inp.focus(); inp.select(); }
  toast('Tier added — name it and set prices below');
}
function removeTier(key){
  if(LOCKED) return;
  if(TIERS.length<=1){ alert('At least one pricing tier is required.'); return; }
  const t=TIERS.find(x=>x.key===key); if(!t) return;
  confirmModal('Remove pricing tier?', `Removing “${escHtml(t.name)}” deletes its price from every SKU and resets any quote lines using it. This can't be undone.`, 'Remove tier', ()=>{
    const idx=state.tiers.findIndex(x=>x.key===key);
    if(idx>=0) state.tiers.splice(idx,1);           // mutate in place to keep TIERS reference
    for(const s of state.skus){ delete s.price[key]; }
    sanitizeSelections();
    renderData(); persist(); toast('Tier removed');
  }, true);
}
function tierMove(key, dir){
  if(LOCKED) return;
  const i=state.tiers.findIndex(t=>t.key===key); if(i<0) return;
  const j=i+dir; if(j<0||j>=state.tiers.length) return;
  const a=state.tiers; [a[i],a[j]]=[a[j],a[i]];      // swap in place
  renderData(); persist();
}
function editTierField(key, field, value){
  const t=TIERS.find(x=>x.key===key); if(!t) return;
  t[field]=value;
  if(field==='name'){ document.querySelectorAll(`[data-tierhead="${key}"]`).forEach(el=>el.textContent=value); }
  persist();
}

  const opts = TIERS.map(x=>`<option value="${x.key}">${escHtml(x.name)}${x.key===tierKey?' (this tier — adjusts current)':''}</option>`).join('');

      <div class="reprice-row">
        <input id="rp-pct" type="number" step="1" min="0" value="100" class="din" style="width:84px">
        <span style="font-weight:600;color:var(--ink-600)">% of</span>
        <select id="rp-ref" class="din" style="width:auto;min-width:150px">${opts}</select>

    <button class="btn btn-sm btn-primary" id="modalOk">Apply to all SKUs</button></div>`);
  $('#modalOk').addEventListener('click',()=>{

    sanitizeSelections(); closeModal(); renderData(); persist();
    toast(`Repriced ${n} SKUs — ${t.name} = ${pct}% of ${tierName(ref)}`);

}
function dupeSku(id){

/* export / import */
function download(filename, text, type){
  const blob=new Blob([text],{type:type||'text/plain'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },100);
}
function exportConfig(){
  const data={version:SCHEMA_VERSION, exportedAt:new Date().toISOString(), tiers:state.tiers, assumptions:state.assumptions, skus:state.skus, order:state.order, ui:state.ui};
  download('ascendra-margin-config.json', JSON.stringify(data,null,2),'application/json');
  toast('Configuration exported');
}
function importConfig(){ $('#importFile').click(); }
function handleImport(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.skus||!Array.isArray(data.skus)) throw new Error('no skus');
      const tiers = (Array.isArray(data.tiers)&&data.tiers.length)?data.tiers.map(t=>({...t})):FACTORY_TIERS.map(t=>({...t}));
      state={ version:SCHEMA_VERSION, tiers,
        assumptions:{...FACTORY_ASSUMPTIONS, ...(data.assumptions||{})},
        skus:data.skus.map(s=>({...s, price:{...s.price}})),
        order:data.order||{}, ui:{globalTier:(data.ui&&data.ui.globalTier&&tiers.some(t=>t.key===data.ui.globalTier))?data.ui.globalTier:(tiers[0]||{}).key} };
      TIERS=state.tiers; sanitizeSelections();
      LOCKED=true; updateLockUI(); persist();
      setGlobalTier(state.ui.globalTier); renderView(currentView);
      toast('Configuration imported');
    }catch(err){ alert('Could not read that file. Please choose a configuration exported from this tool.'); }
  };
  reader.readAsText(file);
}
function exportCsv(){
  const rows=[['SKU','Code','Category','Pricing','Unit cost','Unit price','Markup %','Margin %','Qty','Line revenue','Line profit']];
  for(const id of orderIds()){
    const s=skuById(id); const L=state.order[id]; const p=effectivePrice(L,s); const {markup,margin,profit}=calc(s.cost,p);
    const q=Number(L.qty)||0;
    const mode = L.mode==='custom'?'Custom':tierName(L.mode);
    rows.push([s.name, s.code||'', s.catFull, mode, s.cost.toFixed(2), p.toFixed(2), (markup*100).toFixed(1), (margin*100).toFixed(1), q, (p*q).toFixed(2), (profit*q).toFixed(2)]);
  }
  const t=orderTotals();
  rows.push([]);
  rows.push(['TOTAL','','','','', '', (t.markup*100).toFixed(1), (t.margin*100).toFixed(1), t.units, t.rev.toFixed(2), t.profit.toFixed(2)]);
  const csv=rows.map(r=>r.map(c=>{ const v=String(c); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }).join(',')).join('\n');
  download('ascendra-quote.csv', csv, 'text/csv');
  toast('Quote exported to CSV');
}
function copySummary(){
  const t=orderTotals();
  let lines=['ASCENDRA BIO — Margin Forecast', new Date().toLocaleString(), ''];
  for(const id of orderIds()){
    const s=skuById(id); const L=state.order[id]; const p=effectivePrice(L,s); const {margin}=calc(s.cost,p); const q=Number(L.qty)||0;
    const mode=L.mode==='custom'?'Custom':tierName(L.mode);
    lines.push(`${s.name} — ${q} × ${fmtMoney(p)} (${mode}) · ${fmtMargin(margin)} margin`);
  }
  lines.push('', `Revenue ${fmtMoney0(t.rev)} · Cost ${fmtMoney0(t.cost)} · Profit ${fmtMoney0(t.profit)}`,
    `Blended margin ${fmtMargin(t.margin)} · Markup ${fmtMarkup(t.markup)}`);
  const text=lines.join('\n');
  navigator.clipboard?.writeText(text).then(()=>toast('Summary copied')).catch(()=>{
    openModal(`<div class="modal-head"><h3>Copy summary</h3></div><div class="modal-body"><textarea readonly>${text}</textarea></div><div class="modal-foot"><button class="btn btn-sm btn-primary" data-act="modalCancel">Done</button></div>`);
  });
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildPrintDoc(){

function buildMatrixPrintDoc(){
  const dateStr = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const q = ($('#matrixSearch').value||'').trim().toLowerCase();
  const shownMetrics = ['price','markup','margin'].filter(m=>matrixCols[m]);
  let rows = state.skus.filter(s=>{
    if(matrixFilterCat && s.catFull!==matrixFilterCat) return false;
    if(q && !(s.name.toLowerCase().includes(q)||(s.code||'').toLowerCase().includes(q)||s.catFull.toLowerCase().includes(q))) return false;
    return true;
  });
  const dir=matrixSort.dir;
  rows.sort((a,b)=>{ const va=matrixSortVal(a,matrixSort.key), vb=matrixSortVal(b,matrixSort.key); if(typeof va==='string') return va<vb?-1*dir:(va>vb?1*dir:0); return (va-vb)*dir; });
  const filters=[];
  if(matrixFilterCat) filters.push('Category: '+matrixFilterCat);
  if(q) filters.push('Search: “'+q+'”');
  // two-row header
  let thead=`<thead><tr><th rowspan="2">SKU</th><th rowspan="2">Category</th><th rowspan="2" class="r">Unit cost</th>`;
  TIERS.forEach(t=>thead+=`<th class="pd-tier-grp" colspan="${shownMetrics.length}">${escHtml(t.name)}</th>`);
  thead+=`</tr><tr>`;
  TIERS.forEach(()=>{ shownMetrics.forEach((m,mi)=>{ thead+=`<th class="r ${mi===0?'pd-tier-div':''}">${m==='price'?'Price':m==='markup'?'Markup':'Margin'}</th>`; }); });
  thead+=`</tr></thead>`;
  let tbody='<tbody>';
  if(rows.length===0) tbody+=`<tr><td colspan="${3+shownMetrics.length*TIERS.length}" class="pd-empty">No SKUs match the current filters.</td></tr>`;
  for(const s of rows){
    tbody+=`<tr><td class="pd-name">${escHtml(s.name)}${s.code?`<span>${escHtml(s.code)}</span>`:''}${s.flag?'<em>est.</em>':''}</td><td>${escHtml(s.catFull)}</td><td class="r">${fmtMoney(s.cost)}</td>`;
    TIERS.forEach(t=>{ const price=s.price[t.key]; const {markup,margin}=calc(s.cost,price); const mh=healthClass(margin);
      shownMetrics.forEach((m,mi)=>{ const dv=mi===0?'pd-tier-div':'';
        if(m==='price') tbody+=`<td class="r ${dv}">${fmtMoney(price)}</td>`;
        if(m==='markup') tbody+=`<td class="r ${dv} pd-${mh}">${fmtMarkup(markup)}</td>`;
        if(m==='margin') tbody+=`<td class="r ${dv} pd-${mh}">${fmtMargin(margin)}</td>`; }); });
    tbody+=`</tr>`;
  }
  tbody+='</tbody>';
  document.getElementById('printDoc').innerHTML=`
    <div class="pd-head"><img src="${LOGO_DARK}" alt="Ascendra Bio"><div class="pd-title"><h1>Tier Pricing &amp; Margin Matrix</h1><span>${dateStr}${filters.length?' · '+filters.join(' · '):''}</span></div></div>
    <table class="pd-table pd-matrix">${thead}${tbody}</table>
    <div class="pd-foot">${rows.length} SKU${rows.length===1?'':'s'}${filters.length?' (filtered)':''} across ${TIERS.length} pricing tier${TIERS.length===1?'':'s'}. For research use only. Internal pricing model — not investment, legal, or tax advice. Reference prices per the wholesale price list; unit costs per Ascendra PO TID-0002 (Tidetron) at a 15% supplier discount.</div>`;
}
function buildQuotePrintDoc(){
  const t = orderTotals();
  const ids = orderIds();
  const dateStr = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const hc = t.units>0 ? healthClass(t.margin) : 'good';

  let rowsHTML = ids.map(id=>{
    const s=skuById(id); const L=state.order[id]; const p=effectivePrice(L,s);
    const {markup,margin}=calc(s.cost,p); const q=Number(L.qty)||0;
    const floor=(L.floor===''||L.floor==null)?null:Number(L.floor);
    const underFloor=(L.mode==='custom'&&floor!=null&&p<floor);
    const mode = L.mode==='custom'?'Custom':tierName(L.mode);
    const mh = underFloor?'bad':healthClass(margin);
    return `<tr>
      <td class="pd-name">${escHtml(s.name)}${s.code?`<span>${escHtml(s.code)}</span>`:''}${s.flag?'<em>est.</em>':''}</td>
      <td>${mode}${underFloor?' <em>below floor</em>':''}</td>
      <td class="r">${fmtMoney(s.cost)}</td>
      <td class="r">${fmtMoney(p)}</td>
      <td class="r pd-${mh}">${fmtMarkup(markup)}</td>
      <td class="r pd-${mh}">${fmtMargin(margin)}</td>
      <td class="r">${q.toLocaleString()}</td>
      <td class="r">${fmtMoney(s.cost*q)}</td>
      <td class="r strong">${fmtMoney(p*q)}</td>
    </tr>`;
  }).join('');
  if(ids.length===0) rowsHTML = `<tr><td colspan="9" class="pd-empty">No products in this quote.</td></tr>`;

  const tierRows = TIERS.map(tr=>{
    const d=tierTotals(tr.key); const active = tr.key===state.ui.globalTier;
    return `<tr class="${active?'pd-active':''}">
      <td class="pd-name">${tr.name}${active?'<span class="pd-badge">default</span>':''}</td>
      <td>${tr.sub}</td>
      <td class="r">${fmtMoney0(d.rev)}</td>
      <td class="r">${fmtMoney0(d.cost)}</td>
      <td class="r">${fmtMoney0(d.profit)}</td>
      <td class="r">${fmtMarkup(d.markup)}</td>
      <td class="r">${fmtMargin(d.margin)}</td>
    </tr>`;
  }).join('');

  document.getElementById('printDoc').innerHTML = `
    <div class="pd-head">
      <img src="${LOGO_DARK}" alt="Ascendra Bio">
      <div class="pd-title"><h1>Margin &amp; Markup Forecast</h1><span>${dateStr}</span></div>
    </div>
    <div class="pd-summary">
      <div class="pd-sum-main">
        <span class="pd-lbl">Blended margin</span>
        <span class="pd-big">${t.units>0?fmtMargin(t.margin):'—'}</span>
        <span class="pd-markup">${t.units>0?fmtMarkup(t.markup):'—'} blended markup</span>
      </div>
      <div class="pd-sum-stats">
        <div><span>Revenue</span><b>${fmtMoney0(t.rev)}</b></div>
        <div><span>Cost</span><b>${fmtMoney0(t.cost)}</b></div>
        <div><span>Profit</span><b>${fmtMoney0(t.profit)}</b></div>
        <div><span>Units</span><b>${t.units.toLocaleString()}</b></div>
        <div><span>SKUs</span><b>${ids.length}</b></div>
      </div>
    </div>
    <table class="pd-table">
      <thead><tr>
        <th>Product</th><th>Pricing</th><th class="r">Unit cost</th><th class="r">Unit price</th>
        <th class="r">Markup</th><th class="r">Margin</th><th class="r">Qty</th><th class="r">Line cost</th><th class="r">Line total</th>
      </tr></thead>
      <tbody>${rowsHTML}</tbody>
      ${ids.length? `<tfoot><tr><td colspan="6"></td><td class="r">${t.units.toLocaleString()}</td><td class="r">${fmtMoney0(t.cost)}</td><td class="r strong">${fmtMoney0(t.rev)}</td></tr></tfoot>`:''}
    </table>
    <div class="pd-section-title">Margin by tier — entire order priced at each tier</div>
    <table class="pd-table pd-tier">
      <thead><tr><th>Tier</th><th>Minimum</th><th class="r">Revenue</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">Markup</th><th class="r">Margin</th></tr></thead>
      <tbody>${tierRows}</tbody>
    </table>
    <div class="pd-foot">For research use only. Internal pricing model — not investment, legal, or tax advice. Reference prices per the wholesale price list; unit costs per Ascendra PO TID-0002 (Tidetron) at a 15% supplier discount. “Est.” marks SKUs with interpolated cost or derived reference price.</div>`;
}
window.addEventListener('beforeprint', buildPrintDoc);


/* ============ EVENT DELEGATION ============ */
document.addEventListener('click', e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act;
  switch(act){
    case 'view': renderView(t.dataset.view); break;
    case 'lock': doLockToggle(); break;
    case 'globalTier': setGlobalTier(t.dataset.mode); break;
    case 'applyAll': applyTierToAll(); break;
    case 'clearOrder': clearOrder(); break;
    case 'add': addSkuToOrder(t.dataset.id); $('#skuSearch').value=''; renderCombo(''); $('#skuSearch').focus(); break;
    case 'mode': {
      const id=t.dataset.id; const L=state.order[id]; const sku=skuById(id);
      const prevPrice=effectivePrice(L, sku);      // price under the tier they're leaving
      if(t.dataset.mode==='custom') L.custom=round4(prevPrice); // start custom where the tier left off
      L.mode=t.dataset.mode;
      updateRow(id); renderSummary(); persist(); break;
    }
    case 'remove': { const id=t.dataset.id; delete state.order[id]; renderOrderList(); renderSummary(); persist(); renderCombo($('#skuSearch').value); break; }
    case 'print': buildPrintDoc(); window.print(); break;
    case 'copySummary': copySummary(); break;
    case 'exportCsv': exportCsv(); break;
    case 'exportConfig': exportConfig(); break;
    case 'importConfig': importConfig(); break;
    case 'reset': resetAll(); break;
    case 'addSkuToggle': addSkuOpen=!addSkuOpen; if(addSkuOpen){renderAddSkuForm();$('#addSkuForm').classList.remove('hidden');} else {$('#addSkuForm').classList.add('hidden');} break;
    case 'addSkuSave': addSkuSave(); break;
    case 'removeSku': removeSku(t.dataset.id); break;
    case 'addTier': addTier(); break;
    case 'removeTier': removeTier(t.dataset.key); break;
    case 'tierMove': tierMove(t.dataset.key, parseInt(t.dataset.dir,10)); break;
    case 'repriceTier': openRepriceModal(t.dataset.key); break;
    case 'dupeSku': dupeSku(t.dataset.id); break;
    case 'modalScrim': if(e.target===t) closeModal(); break;
    case 'modalCancel': closeModal(); break;
  }
});
document.addEventListener('input', e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act;
  if(act==='qty'){ const id=t.dataset.id; state.order[id].qty = t.value===''?0:Math.max(0,Math.floor(Number(t.value))); updateRow(id); renderSummary(); persist(); }
  else if(act==='price'){ const id=t.dataset.id; state.order[id].custom = t.value; updateRow(id); renderSummary(); persist(); }
  else if(act==='floor'){ const id=t.dataset.id; state.order[id].floor = t.value; updateRow(id); persist(); }
  else if(act==='skuField'){ editSkuField(t.dataset.id, t.dataset.field, t.value); }
  else if(act==='tierField'){ editTierField(t.dataset.key, t.dataset.field, t.value); }
  else if(act==='assump'){ editAssumption(t.dataset.key, t.value); }
});

/* search box */
const searchEl=$('#skuSearch');
searchEl.addEventListener('focus', ()=>renderCombo(searchEl.value));
searchEl.addEventListener('input', ()=>renderCombo(searchEl.value));
searchEl.addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'){ e.preventDefault(); moveCombo(1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); moveCombo(-1); }
  else if(e.key==='Enter'){ const items=comboItems(); const it=comboHi>=0?items[comboHi]:items[0]; if(it){ e.preventDefault(); addSkuToOrder(it.dataset.id); searchEl.value=''; renderCombo(''); } }
  else if(e.key==='Escape'){ $('#combo').classList.add('hidden'); searchEl.blur(); }
});
document.addEventListener('click', e=>{
  if(!e.target.closest('#combo') && !e.target.closest('.search-wrap')) $('#combo').classList.add('hidden');
});

$('#matrixSearch').addEventListener('input', renderMatrix);
$('#matrixColSeg').addEventListener('click', e=>{
  const b=e.target.closest('button[data-col]'); if(!b) return;
  const shown=Object.values(matrixCols).filter(Boolean).length;
  if(matrixCols[b.dataset.col] && shown<=1) return; // keep at least one
  matrixCols[b.dataset.col]=!matrixCols[b.dataset.col];
  b.classList.toggle('active', matrixCols[b.dataset.col]);
  renderMatrix();
});
$('#matrixCatFilter').addEventListener('change', e=>{ matrixFilterCat=e.target.value; renderMatrix(); });
$('#dataSearch').addEventListener('input', e=>{ dataFilterQ=e.target.value.trim().toLowerCase(); renderDataTable(); });
$('#dataCatFilter').addEventListener('change', e=>{ dataFilterCat=e.target.value; renderDataTable(); });
// column-header sorting (delegated so it survives re-renders)
document.addEventListener('click', e=>{
  const dth=e.target.closest('#dataTable th[data-sortcol]');
  if(dth){ const c=dth.dataset.sortcol; if(dataSort.col===c) dataSort.dir*=-1; else {dataSort.col=c; dataSort.dir=1;} renderDataTable(); return; }
  const mth=e.target.closest('#matrixTable th[data-sortkey]');
  if(mth){ const k=mth.dataset.sortkey; if(matrixSort.key===k) matrixSort.dir*=-1; else {matrixSort.key=k; matrixSort.dir=1;} renderMatrix(); return; }
});
$('#importFile').addEventListener('change', e=>{ if(e.target.files[0]) handleImport(e.target.files[0]); e.target.value=''; });

/* ============ INIT ============ */
function init(){
  document.getElementById('brandLogo').src = LOGO_DARK;
  state = loadState();
  TIERS = state.tiers;          // bind live reference to loaded tiers
  sanitizeSelections();
  renderTierSeg($('#globalTierSeg'), state.ui.globalTier, 'globalTier');
  updateLockUI();
  renderView('builder');
}
init();
</script>
</body>
</html>
