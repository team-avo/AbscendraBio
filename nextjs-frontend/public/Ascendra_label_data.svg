<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="768" viewBox="0 0 2048 768">
  <defs>
    <linearGradient id="textBlue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#062f68"/><stop offset="100%" stop-color="#0b478d"/></linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0a2f62" flood-opacity="0.15"/></filter>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="333" y="223" fill="#111111" font-size="32">{{FORMULA}}</text>
    <text x="333" y="391" fill="#111111" font-size="31">{{CAS}}</text>
    <text x="333" y="559" fill="#111111" font-size="31">{{MW}}</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="866" y="377" font-size="{{NAMESIZE}}" font-weight="800" letter-spacing="4" fill="url(#textBlue)" filter="url(#softShadow)">{{NAME}}</text>
    <text x="866" y="466" font-size="56" font-weight="700" fill="#0d1b3e">{{STRENGTH}}</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff" font-size="31" text-anchor="middle">
    <text x="935" y="719" font-weight="400">{{LOT}}</text>
    <text x="1338" y="719" font-weight="400">{{MFG}}</text>
  </g>
</svg>
