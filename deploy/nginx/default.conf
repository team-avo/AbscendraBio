# Ascendra reverse proxy.
#   /api/   -> backend (Express)
#   /media/ -> MinIO bucket (uploaded images/files)
#   /       -> frontend (Next.js)
# On the production server this same block sits behind Certbot for SSL (443).

upstream ascendra_backend  { server backend:5001; }
upstream ascendra_frontend { server frontend:3000; }
upstream ascendra_minio    { server minio:9000; }

server {
    listen 80;
    server_name _;
    client_max_body_size 30m;

    location /api/ {
        proxy_pass http://ascendra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public read of uploaded objects, served under the site domain.
    location /media/ {
        proxy_pass http://ascendra_minio/ascendra-media/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://ascendra_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
