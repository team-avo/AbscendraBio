# Full Ascendra stack: db + cache + object storage + backend + frontend + proxy.
# Same file runs locally (test) and on the Iceland VPS (prod) — only deploy/.env differs.
name: ascendra

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Create the media bucket and make it public-read (one-shot).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb -p local/${S3_BUCKET_NAME} || true;
      mc anonymous set download local/${S3_BUCKET_NAME} || true;
      echo 'minio bucket ready';
      "

  backend:
    build:
      context: ../nodejs-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "5001"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AWS_ENDPOINT: http://minio:9000
      AWS_FORCE_PATH_STYLE: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_KEY_ID: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      AWS_S3_BASE_URL: ${PUBLIC_URL}/media
      FRONTEND_URL: ${PUBLIC_URL}
      FRONTEND_CORS_URL: ${PUBLIC_URL}
      RUN_SEED: ${RUN_SEED:-false}

  frontend:
    build:
      context: ../nextjs-frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-8080}:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
